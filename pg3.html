<!DOCTYPE html>
<html>
<head>
    <title>HTML Input Types Demo</title>
</head>
<body>

<h2 align="center">HTML Form - All Input Types</h2>

<form>

<!-- Text -->
<label>1. Name (Text):</label><br>
<input type="text" placeholder="Enter your name">
<br><br>

<!-- Password -->
<label>2. Password:</label><br>
<input type="password" placeholder="Enter password">
<br><br>

<!-- Email -->
<label>3. Email:</label><br>
<input type="email" placeholder="Enter email">
<br><br>

<!-- Number -->
<label>4. Age:</label><br>
<input type="number" placeholder="Enter age">
<br><br>

<!-- Date -->
<label>5. Date of Birth:</label><br>
<input type="date">
<br><br>

<!-- File -->
<label>6. Upload Resume:</label><br>
<input type="file">
<br><br>

<!-- Checkbox -->
<label>7. Hobbies (Checkbox):</label><br>
<input type="checkbox"> Reading
<input type="checkbox"> Music
<input type="checkbox"> Sports
<br><br>

<!-- Radio -->
<label>8. Gender (Radio Button):</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
<br><br>


<!-- Submit -->
<label>9. Submit Button:</label><br>
<input type="submit" value="Submit">
<br><br>

<!-- Reset -->
<label>10. Reset Button:</label><br>
<input type="reset" value="Reset">
<br><br>



</form>

</body>
</html>
